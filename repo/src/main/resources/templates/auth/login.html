<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in · RegistrarOps</title>
  <link rel="stylesheet" th:href="@{/vendor/bootstrap.min.css}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="ro-body">
  <div class="ro-login-shell">
    <div class="ro-login-card">
      <div class="ro-brand">
        <span class="ro-logo">◆</span>
        <span class="ro-brand-name">RegistrarOps</span>
      </div>
      <p class="text-center mb-4" style="color: var(--text-secondary);">Academic Services Portal</p>

      <div th:if="${param.error}"  class="alert alert-danger">Invalid username or password.</div>
      <div th:if="${param.locked}" class="alert alert-warning">Account locked. Try again in 15 minutes.</div>
      <div th:if="${param.logout}" class="alert alert-info">You have been signed out.</div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" autofocus required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>

      <p class="text-center mt-4 mb-0" style="color: var(--text-muted); font-size: 12px;">
        &copy; RegistrarOps · Offline Academic Services
      </p>
    </div>
  </div>
</body>
</html>
