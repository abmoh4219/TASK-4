<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<body>
<div th:replace="~{layout/base :: layout('Catalog item', ~{::section})}">
  <section>
    <div class="ro-card" style="max-width: 800px;">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <h1 class="h3" th:text="${course.title}">Title</h1>
          <div style="color: var(--text-secondary);" th:text="${course.authorName} + ' · ' + ${course.category}">author · category</div>
        </div>
        <span class="ro-role-badge ro-role-student" th:text="${course.code}">CODE</span>
      </div>
      <p class="mt-3" th:text="${course.description}">description</p>
      <div style="display: flex; gap: 24px; margin-top: 16px;">
        <span style="color: var(--accent-amber);" th:text="'★ ' + ${course.ratingAvg}">★</span>
        <span style="color: var(--text-secondary);" th:text="${course.credits} + ' credits'">credits</span>
        <span style="color: var(--accent-green); font-weight: 600;"
              th:text="${course.price.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'Free' : '$' + course.price}">$0</span>
      </div>

      <div sec:authorize="hasRole('STUDENT')" class="mt-4">
        <h3 class="h6" style="color: var(--text-secondary);">Rate this course</h3>
        <form th:action="@{/catalog/rate}" method="post" class="d-flex gap-2 align-items-center">
          <input type="hidden" name="itemType" value="course"/>
          <input type="hidden" name="itemId" th:value="${course.id}"/>
          <select name="score" class="form-select" style="width: 120px;">
            <option value="5">★★★★★</option>
            <option value="4">★★★★☆</option>
            <option value="3">★★★☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="1">★☆☆☆☆</option>
          </select>
          <button type="submit" class="btn btn-primary">Submit rating</button>
        </form>
      </div>
    </div>

    <div class="ro-card" style="max-width: 800px;">
      <h2 class="h5 mb-3">Course materials</h2>
      <div th:if="${#lists.isEmpty(materials)}" class="ro-empty">No materials available yet.</div>
      <table th:if="${not #lists.isEmpty(materials)}" class="table">
        <thead>
          <tr><th>Title</th><th>Type</th><th>Price</th></tr>
        </thead>
        <tbody>
          <tr th:each="m : ${materials}">
            <td th:text="${m.title}">title</td>
            <td th:text="${m.type}">type</td>
            <td th:text="${m.price.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'Free' : '$' + m.price}">$0</td>
          </tr>
        </tbody>
      </table>
    </div>
    <a th:href="@{/catalog}" class="btn btn-outline-light">Back to catalog</a>
  </section>
</div>
</body>
</html>
