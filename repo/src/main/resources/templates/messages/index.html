<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout('Messages', ~{::section})}">
  <section>
    <div class="ro-card">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="h4 m-0">Notification Center</h1>
        <form th:action="@{/messages/mark-read}" method="post" class="m-0">
          <button type="submit" class="btn btn-sm btn-outline-light">Mark all read</button>
        </form>
      </div>

      <div th:if="${#lists.isEmpty(messages)}" class="ro-empty">
        <div class="ro-empty-icon">✓</div>
        <h3 class="h5">All caught up!</h3>
        <p style="color: var(--text-secondary);">You have no notifications.</p>
      </div>

      <table th:if="${not #lists.isEmpty(messages)}" class="table mt-3">
        <thead>
          <tr><th>Category</th><th>Subject</th><th>Body</th><th>×</th><th>Time</th></tr>
        </thead>
        <tbody>
          <tr th:each="m : ${messages}"
              th:style="${m.isRead} ? '' : 'background: rgba(47,129,247,0.05);'">
            <td><span class="ro-role-badge ro-role-student" th:text="${m.category}">CAT</span></td>
            <td th:text="${m.subject}">subject</td>
            <td style="color: var(--text-secondary);" th:text="${m.body}">body</td>
            <td>
              <span th:if="${m.threadCount > 1}"
                    class="ro-role-badge ro-role-reviewer"
                    th:text="${m.threadCount}">2</span>
            </td>
            <td style="color: var(--text-muted); font-size: 12px;"
                th:text="${#temporals.format(m.createdAt, 'MM-dd HH:mm')}">when</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="ro-card">
      <h2 class="h6">Preferences</h2>
      <div class="mt-3" th:if="${preferences != null}">
        <form th:action="@{/messages/preferences/quiet-hours}" method="post" class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Quiet hours start</label>
            <input type="number" min="0" max="23" name="startHour" class="form-control" th:value="${preferences.quietStartHour}"/>
          </div>
          <div class="col-md-3">
            <label class="form-label">Quiet hours end</label>
            <input type="number" min="0" max="23" name="endHour" class="form-control" th:value="${preferences.quietEndHour}"/>
          </div>
          <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
        <p class="mt-3" style="color: var(--text-muted); font-size: 12px;">
          Currently muted categories:
          <span th:text="${preferences.mutedCategories.isBlank() ? '(none)' : preferences.mutedCategories}">none</span>
        </p>
        <form th:action="@{/messages/preferences/mute}" method="post" class="row g-2 align-items-end mt-2">
          <div class="col-md-4">
            <label class="form-label">Mute category</label>
            <select name="category" class="form-select">
              <option value="ORDER">ORDER</option>
              <option value="GRADE">GRADE</option>
              <option value="EVALUATION">EVALUATION</option>
              <option value="SECURITY">SECURITY</option>
            </select>
          </div>
          <div class="col-md-3">
            <button type="submit" class="btn btn-outline-light">Mute</button>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
</body>
</html>
