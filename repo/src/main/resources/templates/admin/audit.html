<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout('Audit log', ~{::section})}">
  <section>
    <div class="ro-card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 class="h4 m-0">Audit log</h1>
        <span class="ro-role-badge ro-role-reviewer">IMMUTABLE AUDIT RECORD</span>
      </div>
      <p style="color: var(--text-muted);">
        Append-only by design — every action creates a new record. No edits, no deletes.
      </p>
      <table class="table">
        <thead>
          <tr><th>#</th><th>When</th><th>Actor</th><th>Action</th><th>Entity</th><th>ID</th><th>New (masked)</th></tr>
        </thead>
        <tbody>
          <tr th:each="l : ${logs}">
            <td th:text="${l.id}">1</td>
            <td style="font-size: 12px;" th:text="${#temporals.format(l.createdAt, 'yyyy-MM-dd HH:mm:ss')}">date</td>
            <td th:text="${l.actorUsername ?: 'system'}">actor</td>
            <td th:text="${l.action}">action</td>
            <td th:text="${l.entityType}">type</td>
            <td th:text="${l.entityId}">id</td>
            <td style="font-family: monospace; font-size: 11px; max-width: 320px; overflow: hidden;"
                th:text="${l.newValueMasked}">json</td>
          </tr>
        </tbody>
      </table>
      <div class="d-flex gap-2">
        <a th:if="${page > 0}" th:href="@{/admin/audit(page=${page - 1})}" class="btn btn-sm btn-outline-light">← Previous</a>
        <a th:if="${hasNext}" th:href="@{/admin/audit(page=${page + 1})}" class="btn btn-sm btn-outline-light">Next →</a>
      </div>
    </div>
  </section>
</div>
</body>
</html>
