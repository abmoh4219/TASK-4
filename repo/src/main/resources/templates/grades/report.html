<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout('My grades', ~{::section})}">
  <section>
    <div class="ro-card">
      <h1 class="h4 mb-3">Academic Report</h1>
      <div th:if="${#lists.isEmpty(grades)}" class="ro-empty">
        No grades recorded yet.
      </div>
      <table th:if="${not #lists.isEmpty(grades)}" class="table">
        <thead>
          <tr><th>Course</th><th>Letter</th><th>GPA</th><th>Weighted score</th><th>Credits</th><th>Calculated</th></tr>
        </thead>
        <tbody>
          <tr th:each="g : ${grades}">
            <td th:text="${courseTitles[g.courseId]}">title</td>
            <td><span class="ro-role-badge ro-role-student" th:text="${g.letterGrade}">A</span></td>
            <td th:text="${g.gpaPoints}">0</td>
            <td th:text="${g.weightedScore}">0</td>
            <td th:text="${g.credits}">3</td>
            <td th:text="${#temporals.format(g.calculatedAt, 'yyyy-MM-dd')}">date</td>
          </tr>
        </tbody>
      </table>
      <div class="mt-3" style="font-size: 16px;">
        <strong>Cumulative GPA:</strong> <span class="ro-role-badge ro-role-admin" th:text="${cumGpa}">0.00</span>
        &nbsp;&nbsp;
        <strong>Total credits:</strong> <span th:text="${totalCredits}">0</span>
      </div>
    </div>
  </section>
</div>
</body>
</html>
