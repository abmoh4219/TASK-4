<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout('Grade entry', ~{::section})}">
  <section>
    <div class="ro-card">
      <h1 class="h4 mb-1" th:text="${course.title}">Course title</h1>
      <div style="color: var(--text-secondary);" th:text="${course.code} + ' · ' + ${course.credits} + ' credits'">code · credits</div>
      <div class="mt-2" style="color: var(--text-muted);" th:if="${rule != null}"
           th:text="'Active rule v' + ${rule.version} + ' · weights: ' + ${rule.weightsJson} + ' · policy: ' + ${rule.retakePolicy}">rule</div>
    </div>

    <div class="ro-card">
      <h2 class="h6">Add grade component</h2>
      <form th:action="@{/grades/{id}/components(id=${course.id})}" method="post" class="row g-2 align-items-end">
        <div class="col-md-2">
          <label class="form-label">Student</label>
          <select name="studentId" class="form-select" required>
            <option th:each="e : ${enrollments}" th:value="${e.studentId}" th:text="'Student #' + ${e.studentId}">Student</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Component</label>
          <select name="componentName" class="form-select">
            <option value="coursework">coursework</option>
            <option value="midterm">midterm</option>
            <option value="final">final</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Score</label>
          <input type="number" step="0.01" name="score" class="form-control" required/>
        </div>
        <div class="col-md-2">
          <label class="form-label">Max</label>
          <input type="number" step="0.01" name="maxScore" class="form-control" value="100"/>
        </div>
        <div class="col-md-2">
          <label class="form-label">Attempt</label>
          <input type="number" name="attemptNumber" class="form-control" value="1"/>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Save</button>
        </div>
      </form>
    </div>

    <div class="ro-card">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="h6 m-0">Recorded components</h2>
        <form th:action="@{/grades/{id}/recalculate(id=${course.id})}" method="post" class="m-0">
          <button type="submit" class="btn btn-sm btn-outline-light">Recalculate all grades</button>
        </form>
      </div>
      <table class="table mt-3">
        <thead><tr><th>Student</th><th>Component</th><th>Score</th><th>Max</th><th>Attempt</th></tr></thead>
        <tbody>
          <tr th:each="c : ${components}">
            <td th:text="${c.studentId}">id</td>
            <td th:text="${c.componentName}">name</td>
            <td th:text="${c.score}">0</td>
            <td th:text="${c.maxScore}">100</td>
            <td th:text="${c.attemptNumber}">1</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>
