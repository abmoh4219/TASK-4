<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
      th:fragment="layout(title,content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
  <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>
  <title th:text="${title} + ' · RegistrarOps'">RegistrarOps</title>
  <link rel="stylesheet" th:href="@{/vendor/bootstrap.min.css}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="ro-body">
  <div class="ro-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="ro-main">
      <div th:replace="~{fragments/topbar :: topbar(${title})}"></div>
      <main class="ro-content">
        <div th:if="${flashSuccess}" class="alert alert-success ro-flash" th:text="${flashSuccess}"></div>
        <div th:if="${flashError}"   class="alert alert-danger  ro-flash" th:text="${flashError}"></div>
        <div th:if="${flashInfo}"    class="alert alert-info    ro-flash" th:text="${flashInfo}"></div>
        <div th:replace="${content}"></div>
      </main>
    </div>
  </div>
  <script th:src="@{/vendor/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/vendor/htmx.min.js}"></script>
  <script th:src="@{/js/app.js}"></script>
  <script th:src="@{/js/search.js}"></script>
</body>
</html>
