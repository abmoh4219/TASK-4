spring:
  application:
    name: registrarops
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/registrarops?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:registrar}
    password: ${SPRING_DATASOURCE_PASSWORD:registrar_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
      hibernate.format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    mode: HTML
  servlet:
    multipart:
      enabled: true
      max-file-size: 11MB
      max-request-size: 11MB
  quartz:
    job-store-type: memory

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.registrarops: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
